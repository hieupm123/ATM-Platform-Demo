# atm_dataset.yaml
# Cấu hình Dataset cho YOLOv8
path: /home/hieu/Project_Demo_NganHang/ATM_Dataset_Cascade  # Đường dẫn tuyệt đối rễ của dự án
train: images/train  # Thư mục chứa ảnh train
val: images/val      # Thư mục chứa ảnh validation (kiểm thử)

# Số lượng class (3)
